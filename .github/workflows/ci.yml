name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -e . pytest build

      - name: CLI smoke test
        run: |
          python -m trax.cli.main --help

      - name: Test suite
        run: |
          python -m pytest

      - name: Build package
        run: |
          python -m build
